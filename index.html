<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kararca | Analitik Matris</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --border: #333;
            --accent: #007bff; /* Mühendislik mavisi */
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
        }

        /* GİRİŞ PANELİ */
        #onboarding {
            padding: 40px 20px;
            border-bottom: 2px solid var(--border);
            background: linear-gradient(to bottom, #111, #0d0d0d);
        }

        .section-title { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        /* OPSİYON VE KRİTER GİRİŞİ */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            flex-grow: 1;
            font-family: inherit;
        }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        /* ANA TABLO */
        .matrix-container { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; border: 1px solid var(--border); padding: 15px; font-size: 0.7rem; text-align: left; }
        td { border: 1px solid var(--border); padding: 15px; background: var(--panel); }

        /* KAYDIRMALI PUANLAMA (SLIDER) */
        .puan-slider {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .puan-label { font-size: 1.2rem; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; }

        /* TEKİL KART (MODAL) */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 1000;
        }

        .card-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .close-btn { background: #333; margin-bottom: 20px; align-self: flex-end; }
        
        .result-val { font-size: 3rem; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="section-title">01. Veri Girişi</div>
    <div class="input-group">
        <input type="text" id="opt-input" placeholder="Opsiyon Ekle (örn: iPhone 15)">
        <button onclick="addOption()">Ekle</button>
    </div>
    <div class="input-group">
        <input type="text" id="crit-input" placeholder="Kriter Ekle (örn: Batarya Ömrü)">
        <button onclick="addCriterion()">Ekle</button>
    </div>
</div>

<div class="matrix-container">
    <div class="section-title">02. Matris Görünümü</div>
    <table id="matrixTable">
        <thead>
            <tr id="headerRow">
                <th>Opsiyonlar</th>
                <th style="width: 100px;">Skor</th>
            </tr>
        </thead>
        <tbody id="bodyRows">
            </tbody>
    </table>
</div>

<div id="modal">
    <button class="close-btn" onclick="closeModal()">KAPAT [X]</button>
    <div class="card-header">
        <div class="section-title">Detaylı Analiz</div>
        <h2 id="modal-title">Seçenek Adı</h2>
    </div>
    <div id="modal-content">
        </div>
    <div style="margin-top: auto; text-align: right;">
        <div class="section-title">Toplam Rasyonel Puan</div>
        <div class="result-val" id="modal-total">0.0</div>
    </div>
</div>

<script>
    let options = [];
    let criteria = [];

    function addOption() {
        const val = document.getElementById('opt-input').value;
        if(val) {
            options.push(val);
            renderTable();
            document.getElementById('opt-input').value = '';
        }
    }

    function addCriterion() {
        const val = document.getElementById('crit-input').value;
        if(val) {
            criteria.push(val);
            renderTable();
            document.getElementById('crit-input').value = '';
        }
    }

    function renderTable() {
        const header = document.getElementById('headerRow');
        const body = document.getElementById('bodyRows');
        
        // Header güncelle
        header.innerHTML = '<th>Opsiyonlar</th>' + 
            criteria.map(c => `<th>${c}</th>`).join('') + 
            '<th>Skor</th>';

        // Satırları güncelle
        body.innerHTML = options.map((opt, i) => `
            <tr onclick="openModal(${i})">
                <td style="font-weight:bold">${opt}</td>
                ${criteria.map(() => `<td>-</td>`).join('')}
                <td style="color:var(--accent)">0.0</td>
            </tr>
        `).join('');
    }

    function openModal(idx) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('modal-title').innerText = options[idx];
        
        const content = document.getElementById('modal-content');
        content.innerHTML = criteria.map((c, cIdx) => `
            <div style="margin-bottom:30px">
                <label class="section-title">${c}</label>
                <input type="range" class="puan-slider" min="1" max="10" step="0.5" value="5" 
                       oninput="this.nextElementSibling.innerText = this.value">
                <span class="puan-label">5</span>
            </div>
        `).join('');
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>

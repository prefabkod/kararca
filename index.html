<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kararca | Net Karar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --accent: #fff;
            --primary: #0066ff;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; }

        .container { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }

        /* KURULUM EKRANI */
        .setup-group { margin-bottom: 30px; }
        .setup-title { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex-grow: 1; background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; outline: none; font-size: 1rem; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        button.add-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 0 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #222; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .tag span { cursor: pointer; color: #ff4444; font-weight: bold; }

        .main-btn { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; width: 100%; margin-top: auto; cursor: pointer; }

        /* PUANLAMA EKRANI */
        #scoring-view, #result-view { display: none; flex-direction: column; height: 100%; }
        
        .criterion-header { text-align: center; margin-bottom: 30px; }
        .criterion-header h2 { font-size: 2rem; margin: 0; color: var(--primary); }
        .criterion-header p { color: #666; margin: 5px 0 0 0; font-size: 0.9rem; }

        .eval-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .eval-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .eval-title { font-weight: 600; font-size: 1.1rem; }
        .eval-score { font-size: 1.5rem; font-weight: 800; color: var(--primary); width: 45px; text-align: right; }

        /* ÖZEL SLIDER (1-10 buçuklu) */
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--primary); cursor: pointer; margin-top: -10px; box-shadow: 0 0 10px rgba(0, 102, 255, 0.5); }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #333; border-radius: 2px; }

        /* SONUÇ EKRANI */
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--surface); margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .result-item.winner { border-color: var(--primary); background: rgba(0, 102, 255, 0.1); }
        .result-rank { font-size: 1.5rem; font-weight: 800; color: #555; width: 30px; }
        .winner .result-rank { color: var(--primary); }
        .result-name { flex-grow: 1; font-weight: 600; font-size: 1.2rem; margin-left: 15px; }
        .result-total { font-size: 1.5rem; font-weight: 800; }

        .nav-buttons { display: flex; gap: 10px; margin-top: auto; padding-bottom: 20px;}
        .nav-buttons button { flex: 1; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: #fff; padding: 18px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<header>KARARCA</header>

<div class="container">
    
    <div id="setup-view">
        <div class="setup-group">
            <label class="setup-title">1. Neleri Kıyaslıyoruz? (Opsiyonlar)</label>
            <div class="input-row">
                <input type="text" id="opt-input" placeholder="Örn: A Markası, B Evi...">
                <button class="add-btn" onclick="addTag('options', 'opt-input', 'opt-tags')">Ekle</button>
            </div>
            <div class="tag-container" id="opt-tags"></div>
        </div>

        <div class="setup-group">
            <label class="setup-title">2. Hangi Açılardan? (Kriterler)</label>
            <div class="input-row">
                <input type="text" id="crit-input" placeholder="Örn: Fiyat, Performans...">
                <button class="add-btn" onclick="addTag('criteria', 'crit-input', 'crit-tags')">Ekle</button>
            </div>
            <div class="tag-container" id="crit-tags"></div>
        </div>

        <button class="main-btn" onclick="startScoring()">Puanlamaya Geç →</button>
    </div>

    <div id="scoring-view">
        <div class="criterion-header">
            <h2 id="current-crit-name">Kriter Adı</h2>
            <p><span id="crit-progress">1</span> / <span id="crit-total">3</span></p>
        </div>

        <div id="evaluation-list" style="overflow-y: auto; flex-grow: 1; padding-bottom: 20px;">
            </div>

        <div class="nav-buttons">
            <button class="btn-secondary" onclick="prevCriterion()">← Geri</button>
            <button class="main-btn" onclick="nextCriterion()" id="next-btn">Sonraki →</button>
        </div>
    </div>

    <div id="result-view">
        <div class="criterion-header">
            <h2>Analiz Sonucu</h2>
            <p>Matematiksel olarak en mantıklı sıralama</p>
        </div>
        
        <div id="final-results"></div>
        
        <button class="btn-secondary" style="margin-top: 30px; width: 100%;" onclick="location.reload()">Yeni Analiz Başlat</button>
    </div>

</div>

<script>
    let data = { options: [], criteria: [], scores: {} };
    let currentCritIndex = 0;

    function addTag(type, inputId, containerId) {
        const input = document.getElementById(inputId);
        const val = input.value.trim();
        if (val && !data[type].includes(val)) {
            data[type].push(val);
            renderTags(type, containerId);
            input.value = '';
        }
    }

    function removeTag(type, index, containerId) {
        data[type].splice(index, 1);
        renderTags(type, containerId);
    }

    function renderTags(type, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = data[type].map((item, i) => 
            `<div class="tag">${item} <span onclick="removeTag('${type}', ${i}, '${containerId}')">✕</span></div>`
        ).join('');
    }

    function startScoring() {
        if (data.options.length < 2 || data.criteria.length < 1) {
            alert("En az 2 opsiyon ve 1 kriter eklemelisin."); return;
        }
        
        // Puan matrisini hazırla
        data.criteria.forEach(c => { if(!data.scores[c]) data.scores[c] = {}; });
        data.options.forEach(o => {
            data.criteria.forEach(c => { if(data.scores[c][o] === undefined) data.scores[c][o] = 5.0; });
        });

        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('scoring-view').style.display = 'flex';
        renderCriterion();
    }

    function renderCriterion() {
        const critName = data.criteria[currentCritIndex];
        document.getElementById('current-crit-name').innerText = critName;
        document.getElementById('crit-progress').innerText = currentCritIndex + 1;
        document.getElementById('crit-total').innerText = data.criteria.length;

        const list = document.getElementById('evaluation-list');
        list.innerHTML = data.options.map(opt => `
            <div class="eval-card">
                <div class="eval-header">
                    <div class="eval-title">${opt}</div>
                    <div class="eval-score" id="score-val-${opt}">${Number(data.scores[critName][opt]).toFixed(1)}</div>
                </div>
                <input type="range" min="1" max="10" step="0.5" value="${data.scores[critName][opt]}" 
                    oninput="updateScore('${critName}', '${opt}', this.value)">
            </div>
        `).join('');

        const nextBtn = document.getElementById('next-btn');
        if (currentCritIndex === data.criteria.length - 1) {
            nextBtn.innerText = "Sonucu Gör";
            nextBtn.style.background = "#00e676"; // Yeşil bitiş butonu
        } else {
            nextBtn.innerText = "Sonraki →";
            nextBtn.style.background = "var(--accent)";
        }
    }

    function updateScore(crit, opt, val) {
        data.scores[crit][opt] = parseFloat(val);
        document.getElementById(`score-val-${opt}`).innerText = parseFloat(val).toFixed(1);
    }

    function nextCriterion() {
        if (currentCritIndex < data.criteria.length - 1) {
            currentCritIndex++;
            renderCriterion();
        } else {
            showResults();
        }
    }

    function prevCriterion() {
        if (currentCritIndex > 0) {
            currentCritIndex--;
            renderCriterion();
        } else {
            document.getElementById('scoring-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'flex';
        }
    }

    function showResults() {
        document.getElementById('scoring-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'flex';

        let finalScores = data.options.map(opt => {
            let total = 0;
            data.criteria.forEach(crit => total += data.scores[crit][opt]);
            return { name: opt, score: total };
        });

        finalScores.sort((a, b) => b.score - a.score);

        const resultHtml = finalScores.map((item, i) => `
            <div class="result-item ${i === 0 ? 'winner' : ''}">
                <div class="result-rank">#${i + 1}</div>
                <div class="result-name">${item.name}</div>
                <div class="result-total">${item.score.toFixed(1)}</div>
            </div>
        `).join('');

        document.getElementById('final-results').innerHTML = resultHtml;
    }
</script>

</body>
</html>

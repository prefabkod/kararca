<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kararca | Cam Deneyimi</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.15);
            --neon: #00ff88;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1a2e, #000);
        }

        header {
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 5px;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Kaydıralabilir Kart Alanı */
        .swiper-container {
            display: flex;
            overflow-x: auto;
            padding: 20px;
            gap: 20px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .swiper-container::-webkit-scrollbar { display: none; }

        .card {
            min-width: 80vw;
            height: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-number {
            font-size: 4rem;
            font-weight: 900;
            opacity: 0.1;
            position: absolute;
            top: 10px;
            right: 20px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: #fff;
            font-size: 1.2rem;
            padding: 10px 0;
            outline: none;
            width: 100%;
            margin-bottom: 20px;
        }

        input:focus { border-bottom-color: var(--neon); }

        .score-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-badge {
            background: var(--neon);
            color: #000;
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.2rem;
        }

        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 100px;
            font-weight: bold;
            font-size: 1rem;
        }

        .btn-add {
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
        }

        .hint {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>KARARCA</h1>
    <div class="hint">← Seçenekleri sağa sola kaydır →</div>
</header>

<div class="swiper-container" id="deck">
    <div class="card">
        <div class="card-number">01</div>
        <label>SEÇENEK ADI</label>
        <input type="text" value="Aday A">
        
        <label>KRİTER PUANI</label>
        <input type="number" class="val" value="0" oninput="updateScore(this)">
        
        <div class="score-row">
            <span>TOPLAM SKOR</span>
            <div class="total-badge">0.0</div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-add" onclick="addNewCard()">+ Yeni Kart</button>
    <button class="btn">ANALİZ</button>
</div>

<script>
    function updateScore(el) {
        const card = el.closest('.card');
        const val = parseFloat(el.value) || 0;
        card.querySelector('.total-badge').innerText = val.toFixed(1);
    }

    function addNewCard() {
        const deck = document.getElementById('deck');
        const count = deck.querySelectorAll('.card').length + 1;
        const newCard = document.createElement('div');
        newCard.className = 'card';
        newCard.innerHTML = `
            <div class="card-number">${count < 10 ? '0'+count : count}</div>
            <label>SEÇENEK ADI</label>
            <input type="text" value="Aday ${String.fromCharCode(64 + count)}">
            <label>KRİTER PUANI</label>
            <input type="number" class="val" value="0" oninput="updateScore(this)">
            <div class="score-row">
                <span>TOPLAM SKOR</span>
                <div class="total-badge">0.0</div>
            </div>
        `;
        deck.appendChild(newCard);
        newCard.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }
</script>

</body>
</html>

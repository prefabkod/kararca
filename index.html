<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kararca | Analitik Deneyim</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #fff;
            --neon: #00ffa3;
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a1a1a, #000);
        }

        /* 1. GİRİŞ KARTI (OVERLAY) */
        #welcome-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .welcome-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(255,255,255,0.05);
        }

        .welcome-card h2 { font-weight: 800; font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 10px; }
        .welcome-card p { color: #888; line-height: 1.6; margin-bottom: 30px; }

        /* 2. ANA TABLO (BENTO TARZI) */
        .main-content {
            padding: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .bento-table {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            margin-top: 20px;
        }

        .bento-table th { padding: 20px; font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; text-align: left; }
        .bento-table td { padding: 20px; border-top: 1px solid var(--border); cursor: pointer; }
        .bento-table tr:hover { background: rgba(255,255,255,0.02); }

        /* 3. TEKİL KART MODAL (KAYDIRILABİLİR) */
        #card-modal {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 90;
            display: none;
            flex-direction: column;
        }

        .swiper-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100%;
            align-items: center;
            padding: 0 20px;
        }

        .detail-card {
            min-width: 85vw;
            height: 70vh;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            margin-right: 20px;
            scroll-snap-align: center;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .detail-card input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: #fff;
            font-size: 2rem;
            font-weight: 800;
            width: 100%;
            outline: none;
            margin-bottom: 20px;
        }

        /* BUTONLAR */
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 35px;
            border-radius: 100px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn {
            position: absolute;
            top: 40px;
            right: 40px;
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px 20px;
        }

        .neon-text { color: var(--neon); font-weight: 800; font-size: 1.5rem; }

    </style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-card">
        <h2>KARARCA</h2>
        <p>Hayatındaki belirsizlikleri matematiksel bir kesinliğe dönüştür. Kriterlerini belirle, seçeneklerini tart ve en rasyonel sonuca ulaş.</p>
        <button onclick="startApp()">KEŞFETMEYE BAŞLA</button>
    </div>
</div>

<div class="main-content" id="main">
    <h3 style="margin-left: 10px; font-weight: 300;">Karar Matrisin</h3>
    <table class="bento-table">
        <thead>
            <tr>
                <th>Seçenek</th>
                <th>Skor</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr onclick="openCards(0)">
                <td>Seçenek A</td>
                <td class="neon-text">0.0</td>
            </tr>
            <tr onclick="openCards(1)">
                <td>Seçenek B</td>
                <td class="neon-text">0.0</td>
            </tr>
        </tbody>
    </table>
    <p style="text-align: center; color: #444; font-size: 0.8rem; margin-top: 20px;">Düzenlemek için satırlara dokun</p>
</div>

<div id="card-modal">
    <button class="close-btn" onclick="closeCards()">Kapat</button>
    <div class="swiper-container" id="card-slider">
        </div>
</div>

<script>
    function startApp() {
        document.getElementById('welcome-overlay').style.display = 'none';
        document.getElementById('main').style.opacity = '1';
    }

    function openCards(index) {
        const modal = document.getElementById('card-modal');
        const slider = document.getElementById('card-slider');
        slider.innerHTML = ''; // Temizle

        // Örnek Kartlar Oluştur (Burayı dinamik yapabilirsin)
        for(let i=1; i<=3; i++) {
            const card = document.createElement('div');
            card.className = 'detail-card';
            card.innerHTML = `
                <span style="color:#444">SEÇENEK ${i}</span>
                <input type="text" value="Aday ${String.fromCharCode(64 + i)}">
                <p>Kriter Puanlarını Bu Kart Üzerinden Güncelleyebilirsin.</p>
                <div style="margin-top:auto">
                    <small>GÜNCEL SKOR</small><br>
                    <span class="neon-text">8.4</span>
                </div>
            `;
            slider.appendChild(card);
        }

        modal.style.display = 'flex';
        // Tıklanan karta odaklan
        slider.children[index].scrollIntoView();
    }

    function closeCards() {
        document.getElementById('card-modal').style.display = 'none';
    }
</script>

</body>
</html>
